name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

  test-rine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            patchelf \
            gcc-multilib \
            libc6-dev-i386 \
            gcc-mingw-w64-x86-64 \
            gcc-mingw-w64-i686 \
            xvfb \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build integration prerequisites
        run: ./scripts/build-integration-prereqs.sh

      - name: Unit tests (rine bin)
        run: cargo test -p rine --bin rine

      - name: Integration tests (x64 fixtures)
        env:
          RINE_FIXTURE_ARCH: x64
        run: xvfb-run -a env WINIT_UNIX_BACKEND=x11 cargo test -p rine --test integration

      - name: Integration tests (x86 fixture dispatch)
        env:
          RINE_FIXTURE_ARCH: x86
        run: xvfb-run -a env WINIT_UNIX_BACKEND=x11 cargo test -p rine --test integration dispatch::x86_

  test-rine32:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            patchelf \
            gcc-multilib \
            libc6-dev-i386 \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install i686 target
        run: rustup target add i686-unknown-linux-gnu

      - name: x86 unit tests
        run: bash ./scripts/build-rine32-unit-tests.sh

      - name: Clippy rine32
        run: cargo clippy -p rine32 --target i686-unknown-linux-gnu --all-targets -- -D warnings
