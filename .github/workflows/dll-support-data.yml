name: DLL Support Data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  push:
    branches:
      - main
    paths:
      - "crates/platform/win32-dll/**"
      - "crates/platform/win64-dll/**"
      - "scripts/generate-dll-support.py"

permissions:
  contents: write

jobs:
  refresh-dll-support-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate DLL support data
        run: python3 scripts/generate-dll-support.py

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- docs/data/dll-support.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/dll-support.json
          git commit -m "docs: refresh DLL support data"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push
