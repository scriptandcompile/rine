<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rine — Configuration Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="no-exe" class="panel">
      <p>No executable selected. Launch with:</p>
      <code>rine --config &lt;path-to-exe&gt;</code>
      <p>Drag and drop an .exe file onto this window and confirm to relaunch with it.</p>
    </div>

    <div id="editor" class="hidden">
      <!-- Tabs -->
      <nav class="tabs">
        <button class="tab active" data-tab="general">General</button>
        <button class="tab" data-tab="filesystem">Filesystem</button>
        <button class="tab" data-tab="dll">DLL</button>
        <button class="tab" data-tab="environment">Environment</button>
        <button class="tab" data-tab="registry">Registry</button>
        <button class="tab" data-tab="winini">WIN.INI</button>
        <button class="tab" data-tab="runner">Runner</button>
        <span id="status-msg"></span>
      </nav>

      <!-- General Tab -->
      <section id="tab-general" class="tab-content active">
        <div class="exe-info panel">
          <label>Executable</label>
          <span id="exe-path-display"></span>
          <div class="config-path">
            <label>Config file</label>
            <span id="config-path-display"></span>
          </div>
        </div>
        <div class="field">
          <label for="win-version">Windows Version</label>
          <div class="select-wrap">
            <select id="win-version"></select>
          </div>
        </div>
      </section>

      <!-- Filesystem Tab -->
      <section id="tab-filesystem" class="tab-content">
        <div class="field">
          <label for="default-root">Default Root</label>
          <div class="input-browse">
            <input type="text" id="default-root" placeholder="Example: ~/.rine/drives">
            <button id="browse-root" class="btn-small" title="Browse…">…</button>
          </div>
        </div>
        <div class="field">
          <label>
            <input type="checkbox" id="case-insensitive" checked>
            Case-insensitive filesystem (slower)
          </label>
        </div>
        <div class="field">
          <label>Drive Mappings</label>
          <div id="drive-list" class="kv-list"></div>
          <button id="add-drive" class="btn-small">+ Add Drive</button>
        </div>
      </section>

      <!-- DLL Tab -->
      <section id="tab-dll" class="tab-content">
        <div class="field">
          <label for="search-order">DLL Search Order</label>
          <p class="hint">DLLs tried before built-in registry, one per line.</p>
          <textarea id="search-order" rows="4" placeholder="Example entries (one per line):&#10;msvcrt.dll&#10;kernel32.dll"></textarea>
        </div>
        <div class="field">
          <label for="force-stub">Force Stub DLLs</label>
          <p class="hint">DLLs that are never loaded from disk, one per line.</p>
          <textarea id="force-stub" rows="4" placeholder="Example entry:&#10;d3d11.dll"></textarea>
        </div>
      </section>

      <!-- Environment Tab -->
      <section id="tab-environment" class="tab-content">
        <div class="field">
          <label>Environment Variables</label>
          <div id="env-list" class="kv-list"></div>
          <button id="add-env" class="btn-small">+ Add Variable</button>
        </div>
      </section>

      <!-- Registry Tab -->
      <section id="tab-registry" class="tab-content">
        <div id="registry-tree" class="registry-tree"></div>
      </section>

      <!-- WIN.INI Tab -->
      <section id="tab-winini" class="tab-content">
        <div class="winini-sections">
          <div class="field winini-field">
            <label for="global-win-ini">Global WIN.INI</label>
            <p class="hint" id="global-win-ini-path"></p>
            <textarea
              id="global-win-ini"
              rows="8"
            ></textarea>
          </div>

          <div class="field winini-field">
            <label for="app-win-ini">Per-App WIN.INI</label>
            <p class="hint" id="app-win-ini-path"></p>
            <textarea
              id="app-win-ini"
              rows="8"
            ></textarea>
          </div>
        </div>
      </section>

      <!-- Runner Tab -->
      <section id="tab-runner" class="tab-content">
        <div class="runner-toolbar">
          <button id="launch-btn" class="btn-primary">Launch with rine</button>
          <span id="exit-code-display" class="exit-code hidden"></span>
        </div>
        <div class="runner-tabs">
          <button class="runner-tab active" data-output="stdout">stdout</button>
          <button class="runner-tab" data-output="stderr">stderr</button>
        </div>
        <div id="runner-stdout" class="output-box runner-pane active"></div>
        <div id="runner-stderr" class="output-box runner-pane"></div>
      </section>
    </div>
  </div>

  <script src="ansi.js"></script>
  <script src="utils/ui.js"></script>
  <script src="tabs/config.js"></script>
  <script src="tabs/general.js"></script>
  <script src="tabs/runner.js"></script>
  <script src="tabs/win_ini.js"></script>
  <script src="tabs/registry.js"></script>
  <script src="app.js"></script>
</body>
</html>
